<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Fhenix 3D Nexus Roadmap</title>
        <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
        <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    </head>
    <body>
        <a-scene fog="type: linear; color: #020202; near: 10; far: 40">
            <a-entity environment="preset: starry; ground: horizon; groundColor: #010101; grid: dots; gridColor: #00ffff; lighting: none; horizonColor: #000033"></a-entity>
            <a-light type="ambient" color="#333"></a-light>
            <a-light
                type="point"
                position="10 15 10"
                intensity="1.5"
                color="#00ffff"
            ></a-light>
            <a-light
                type="point"
                position="-10 5 -10"
                intensity="1"
                color="#ff00ff"
            ></a-light>
            <a-light
                type="directional"
                intensity="0.6"
                position="-1 1 1"
                color="#fff"
            ></a-light>
            <a-entity id="rig" position="0 3 18">
                <a-entity camera look-controls wasd-controls>
                    <a-cursor
                        color="#00ffff"
                        scale="0.4 0.4 0.4"
                        fuse="false"
                        raycaster="objects: .clickable"
                    ></a-cursor>
                </a-entity>
            </a-entity>
            <a-text
                value="FHENIX PHASE 1: ENVIRONMENT SETUP"
                position="0 13.5 0"
                align="center"
                color="#ffffff"
                width="16"
                font="exo2bold"
                material="shader: flat; emissive: #ffffff; emissiveIntensity: 1"
            ></a-text>
            <a-entity id="node1" position="0 11.5 0">
                <a-box
                    id="node1_body"
                    width="6"
                    height="1.8"
                    depth="1"
                    segments-height="2"
                    segments-width="2"
                    segments-depth="2"
                    material="color: #00ff00; opacity: 0.15; transparent: true; metalness: 0.9; roughness: 0.1; wireframe: true"
                ></a-box>
                <a-box
                    width="5.8"
                    height="1.6"
                    depth="0.1"
                    position="0 0 0.55"
                    material="color: #00ff00; opacity: 0.2; transparent: true"
                ></a-box>
                <a-text
                    value="1. PREREQUISITES"
                    align="center"
                    position="0 0.5 0.7"
                    color="#00ff00"
                    width="7"
                    font="exo2bold"
                ></a-text>
                <a-text
                    value="Node.js LTS 20+ / 22+\nValid LTS Check\nnpm / yarn / pnpm\nGit Installed"
                    align="center"
                    position="0 -0.3 0.7"
                    color="#ffffff"
                    width="6"
                    font="kelsonsans"
                    line-height="1.2"
                ></a-text>
                <a-ring
                    color="#00ff00"
                    radius-inner="3.5"
                    radius-outer="3.6"
                    rotation="-90 0 0"
                    material="opacity: 0.6; transparent: true"
                    animation="property: material.opacity; from: 0.6; to: 0.2; dir: alternate; dur: 2000; loop: true"
                ></a-ring>
            </a-entity>
            <a-cylinder
                position="0 9.8 0"
                radius="0.08"
                height="2"
                material="color: #00ff00; shader: flat; emissive: #00ff00; emissiveIntensity: 1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"
            ></a-cylinder>
            <a-entity id="node2" position="0 7.8 0">
                <a-box
                    width="5.5"
                    height="1.8"
                    depth="0.8"
                    material="color: #00aaff; opacity: 0.15; transparent: true; wireframe: true"
                ></a-box>
                <a-box
                    width="5.3"
                    height="1.6"
                    depth="0.1"
                    position="0 0 0.45"
                    material="color: #00aaff; opacity: 0.2; transparent: true"
                ></a-box>
                <a-text
                    value="2. PROJECT INITIALIZE"
                    align="center"
                    position="0 0.5 0.6"
                    color="#00aaff"
                    width="6.5"
                    font="exo2bold"
                ></a-text>
                <a-text
                    value="Run: npx hardhat init\nSelect 'TypeScript Project'\nGenerate Structure"
                    align="center"
                    position="0 -0.2 0.6"
                    color="#ffffff"
                    width="6"
                    font="kelsonsans"
                ></a-text>
            </a-entity>
            <a-cylinder
                position="0 6.6 0"
                radius="0.08"
                height="2"
                rotation="-45 0 0"
                material="color: #00aaff; shader: flat; emissive: #00aaff; emissiveIntensity: 1"
            ></a-cylinder>
            <a-entity id="node3" position="0 4.5 1.5">
                <a-sphere
                    radius="1.5"
                    segments-radial="8"
                    segments-tubular="8"
                    position="0 0 0.5"
                    material="color: #fff; wireframe: true"
                    opacity="0.4"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"
                ></a-sphere>
                <a-box
                    width="7.5"
                    height="2.5"
                    depth="1.2"
                    material="color: #ffffff; opacity: 0.1; transparent: true; wireframe: true"
                ></a-box>
                <a-box
                    width="7"
                    height="2.2"
                    depth="0.1"
                    position="0 0 0.65"
                    material="color: #ffffff; opacity: 0.1; transparent: true"
                ></a-box>
                <a-text
                    value="3. INSTALL DEPENDENCIES"
                    align="center"
                    position="0 0.6 0.8"
                    color="#ffffff"
                    width="8"
                    font="exo2bold"
                ></a-text>
                <a-text
                    value="hardhat@2.22.x (Required)\n@nomicfoundation/hardhat-toolbox@6.x\n@cofhe/hardhat-plugin\n@fhenixprotocol/cofhe-contracts"
                    align="center"
                    position="0 -0.5 0.8"
                    color="#ffffff"
                    width="7"
                    font="kelsonsans"
                    line-height="1.3"
                ></a-text>
            </a-entity>
            <a-cylinder
                position="0 2.8 1.5"
                radius="0.08"
                height="1.8"
                material="color: #ffffff; shader: flat; emissive: #ffffff; emissiveIntensity: 1"
            ></a-cylinder>
            <a-entity id="node4" position="0 1 2.5">
                <a-plane
                    width="6"
                    height="1.8"
                    position="0 0 -0.1"
                    material="color: #ffcc00; opacity: 0.15; transparent: true"
                ></a-plane>
                <a-box
                    width="6.2"
                    height="2"
                    depth="0.1"
                    position="0 0 0.05"
                    material="color: #ffcc00; opacity: 0.1; transparent: true; metalness: 0.9; roughness: 0.1"
                ></a-box>
                <a-text
                    value="4. HARDHAT CONFIG"
                    align="center"
                    position="0 0.5 0.1"
                    color="#ffcc00"
                    width="7"
                    font="exo2bold"
                ></a-text>
                <a-text
                    value="Import Cofhe Plugin\nSet Solidity 0.8.24\nCheck Version Rules\n(No v5/v6 mix)"
                    align="center"
                    position="0 -0.3 0.1"
                    color="#ffffff"
                    width="6"
                    font="kelsonsans"
                    line-height="1.2"
                ></a-text>
            </a-entity>
            <a-entity line="start: 0 0.2 2.5; end: -4.5 -2.5 4; color: #00ff00"></a-entity>
            <a-entity line="start: 0 0.2 2.5; end: 4.5 -2.5 4; color: #ff0055"></a-entity>
            <a-entity line="start: 0.1 0.2 2.5; end: -4.4 -2.5 4; color: #00ff00; opacity: 0.5"></a-entity>
            <a-entity line="start: -0.1 0.2 2.5; end: 4.6 -2.5 4; color: #ff0055; opacity: 0.5"></a-entity>
            <a-entity id="node5_mock" position="-4.5 -4 4">
                <a-box
                    width="4.2"
                    height="2.2"
                    depth="0.2"
                    material="color: #00ff00; opacity: 0.3; transparent: true; wireframe: true"
                ></a-box>
                <a-box
                    width="4"
                    height="2"
                    depth="0.05"
                    position="0 0 0.1"
                    material="color: #00ff00; opacity: 0.3; transparent: true"
                ></a-box>
                <a-text
                    value="MOCK MODE"
                    align="center"
                    position="0 0.5 0.2"
                    color="#ffffff"
                    width="6.5"
                    font="exo2bold"
                ></a-text>
                <a-text
                    value="Deploy Mocks\nSimulate\nEncrypted Ops"
                    align="center"
                    position="0 -0.4 0.2"
                    color="#00ff00"
                    width="6"
                    font="kelsonsans"
                    line-height="1.2"
                ></a-text>
            </a-entity>
            <a-entity id="node5_real" position="4.5 -4 4">
                <a-box
                    width="4.2"
                    height="2.2"
                    depth="0.2"
                    material="color: #ff0055; opacity: 0.3; transparent: true; wireframe: true"
                ></a-box>
                <a-box
                    width="4"
                    height="2"
                    depth="0.05"
                    position="0 0 0.1"
                    material="color: #ff0055; opacity: 0.3; transparent: true"
                ></a-box>
                <a-text
                    value="REAL MODE"
                    align="center"
                    position="0 0.5 0.2"
                    color="#ffffff"
                    width="6.5"
                    font="exo2bold"
                ></a-text>
                <a-text
                    value="Real FHE\nNetwork Execution\nPermit Handling"
                    align="center"
                    position="0 -0.4 0.2"
                    color="#ff0055"
                    width="6"
                    font="kelsonsans"
                    line-height="1.2"
                ></a-text>
            </a-entity>
            <a-entity id="final_nexus" position="0 -7 2.5">
                <a-octahedron
                    radius="1.8"
                    segments-radial="4"
                    material="color: #00ffff; wireframe: true"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 7000; easing: linear"
                ></a-octahedron>
                <a-dodecahedron
                    radius="2.5"
                    material="color: #fff; wireframe: true"
                    opacity="0.2"
                    animation="property: rotation; to: 0 -360 0; loop: true; dur: 12000; easing: linear"
                ></a-dodecahedron>
                <a-text
                    value="PHASE 1 COMPLETE"
                    align="center"
                    position="0 -2.5 0"
                    color="#ffffff"
                    width="10"
                    font="exo2bold"
                ></a-text>
                <a-text
                    value="Environment Ready for Smart Contracts"
                    align="center"
                    position="0 -3 0"
                    color="#00ffff"
                    width="6"
                    font="kelsonsans"
                ></a-text>
            </a-entity>
            <a-plane
                position="0 -9.5 0"
                rotation="-90 0 0"
                width="100"
                height="100"
                material="color: #020202; opacity: 0.5; src: https://cdn.aframe.io/a-grid.png"
            ></a-plane>
        </a-scene>
    </body>
</html>
