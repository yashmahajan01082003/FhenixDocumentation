<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass House Hero</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #0b1020;
            color: #f3f7ff;
            overflow: hidden;
        }

        .page {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
            width: 100vw;
        }

        .dummy-nav {
            background: #0f172a;
            border-right: 1px solid rgba(255, 255, 255, 0.12);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .brand {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-links a {
            display: block;
            text-decoration: none;
            color: rgba(243, 247, 255, 0.9);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 8px;
            padding: 10px 12px;
        }

        .model-panel {
            background: #060610;
            padding: 42px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 24px;
        }

        .panel-text h1 {
            font-size: clamp(1.6rem, 2.4vw, 2.4rem);
            line-height: 1.15;
            margin-bottom: 10px;
            letter-spacing: -0.01em;
        }

        .panel-text p {
            color: rgba(243, 247, 255, 0.82);
            max-width: 56ch;
            line-height: 1.6;
        }

        .model-box {
            width: min(760px, 100%);
            height: min(430px, 58vh);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 12px;
            overflow: hidden;
            background: #060610;
        }

        .model-box iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        @media (max-width: 900px) {
            .page {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }

            .dummy-nav {
                border-right: 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            }

            .model-panel {
                padding: 22px;
            }

            .model-box {
                height: 44vh;
                border-radius: 10px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <aside class="dummy-nav">
            <div class="brand">Dummy Navbar</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Projects</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </aside>

        <section class="model-panel" aria-label="3D model panel">
            <div class="panel-text">
                <h1>3D Glass House Preview</h1>
                <p>
                    This is a compact model container. Text appears above it, and the 3D house scene is mounted below.
                </p>
            </div>
            <div class="model-box">
                <iframe src="./glass.html" title="3D glass house"></iframe>
            </div>
        </section>
    </main>
</body>
</html>
